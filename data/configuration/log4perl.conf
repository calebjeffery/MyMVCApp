# Specify the root logger
log4perl.rootLogger = DEBUG, File, Screen

# Define the file appender (filename is set programmatically in MyApp::Util::Bootstrap)
log4perl.appender.File = Log::Log4perl::Appender::File
log4perl.appender.File.mode = append
log4perl.appender.File.layout = Log::Log4perl::Layout::PatternLayout
log4perl.appender.File.layout.ConversionPattern = [%d] [%p] %F{1}:%L - %m%n

# Console appender for debugging
log4perl.appender.Screen = Log::Log4perl::Appender::Screen
log4perl.appender.Screen.stderr = 1
log4perl.appender.Screen.layout = Log::Log4perl::Layout::PatternLayout
log4perl.appender.Screen.layout.ConversionPattern = [%d] [%p] %m%n

log4perl.logger.MyApp = DEBUG
